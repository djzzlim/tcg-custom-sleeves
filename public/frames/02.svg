<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Blurred inner white glow fading inwards -->
  <rect x="10" y="10" width="380" height="540" fill="none" stroke="white" stroke-width="12" filter="url(#blur)" opacity="0.8" />
  <!-- Solid white border on top -->
  <path d="M0,0 H400 V560 H0 Z M10,10 V550 H390 V10 Z" fill="white" fill-rule="evenodd" />
</svg>